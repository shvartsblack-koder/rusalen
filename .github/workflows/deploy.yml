name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # GitHub Pages project site: https://shvartsblack-koder.github.io/rusalen/
      # When rusalen.ru custom domain is attached, set repo variable VITE_BASE_RUSALEN=/
      - name: Build rusalen
        working-directory: ./rusalen
        run: |
          npm install
          npm run build
        env:
          VITE_BASE: ${{ vars.VITE_BASE_RUSALEN || '/rusalen/' }}
          VITE_LEADS_WEBHOOK_URL: ${{ secrets.VITE_LEADS_WEBHOOK_URL }}
          VITE_PROJECT_NAME: rusalen

      # Served at /живица/ on custom domain (русален.рф/живица)
      - name: Build jivica
        working-directory: ./jivica
        run: |
          npm install
          npm run build
        env:
          VITE_BASE: ${{ vars.VITE_BASE_JIVICA || '/rusalen/jivica/' }}
          VITE_LEADS_WEBHOOK_URL: ${{ secrets.VITE_LEADS_WEBHOOK_URL }}
          VITE_PROJECT_NAME: jivica

      - name: Merge builds
        run: |
          mkdir -p dist
          cp -r rusalen/dist/. dist/
          mkdir -p "dist/живица"
          cp -r jivica/dist/. "dist/живица/"

      - name: Create 404.html for SPA routing
        run: |
          cp dist/index.html dist/404.html
          cp "dist/живица/index.html" "dist/живица/404.html"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
