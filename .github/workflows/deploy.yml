name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build rusalen
        working-directory: ./rusalen
        run: |
          npm install
          npm run build
        env:
          VITE_LEADS_WEBHOOK_URL: ${{ secrets.VITE_LEADS_WEBHOOK_URL }}
          VITE_PROJECT_NAME: rusalen

      - name: Build jivica
        working-directory: ./jivica
        run: |
          npm install
          npm run build
        env:
          VITE_LEADS_WEBHOOK_URL: ${{ secrets.VITE_LEADS_WEBHOOK_URL }}
          VITE_PROJECT_NAME: jivica

      - name: Merge builds
        run: |
          mkdir -p dist
          cp -r rusalen/dist/. dist/
          mkdir -p dist/jivica
          cp -r jivica/dist/. dist/jivica/

      - name: Create 404.html for SPA routing
        run: |
          cp dist/index.html dist/404.html
          cp dist/jivica/index.html dist/jivica/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
